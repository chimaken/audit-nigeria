name: Deploy API image to ECR

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-api-ecr.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_URI: ${{ secrets.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$ECR_URI" ]; then
            echo "Set repository secret ECR_REPOSITORY_URI to Terraform output ecr_repository_url (no tag)."
            exit 1
          fi
          IMAGE="${ECR_URI}:${IMAGE_TAG}"
          docker build -f backend/Dockerfile -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "Pushed ${IMAGE}"
