# Build API + optional async worker images, push to ECR, roll App Runner + Lambda.
# Optional secrets: APPRUNNER_SERVICE_ARN, UPLOAD_WORKER_ECR_REPOSITORY_URI, UPLOAD_WORKER_LAMBDA_ARN
# (terraform outputs: apprunner_service_arn, upload_worker_ecr_url, upload_worker_lambda_arn)

name: Deploy API and workers to ECR

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "scripts/ci/apprunner-set-image.sh"
      - "scripts/ci/lambda-upload-worker-set-image.sh"
      - ".github/workflows/deploy-api-ecr.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_URI: ${{ secrets.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$ECR_URI" ]; then
            echo "Set repository secret ECR_REPOSITORY_URI to Terraform output ecr_repository_url (no tag)."
            exit 1
          fi
          IMAGE="${ECR_URI}:${IMAGE_TAG}"
          docker build -f backend/Dockerfile -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "Pushed ${IMAGE}"

      - name: Build and push async upload worker image
        env:
          WORKER_URI: ${{ secrets.UPLOAD_WORKER_ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$WORKER_URI" ]; then
            echo "Optional: set UPLOAD_WORKER_ECR_REPOSITORY_URI (terraform: upload_worker_ecr_url) to push the Lambda image."
            exit 0
          fi
          IMAGE="${WORKER_URI}:${IMAGE_TAG}"
          docker build -f backend/Dockerfile.lambda --platform linux/amd64 --provenance=false --sbom=false -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "Pushed ${IMAGE}"

      - name: Point App Runner at new API image
        env:
          APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
          ECR_REPOSITORY_URI: ${{ secrets.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/ci/apprunner-set-image.sh

      - name: Update upload worker Lambda
        env:
          UPLOAD_WORKER_LAMBDA_ARN: ${{ secrets.UPLOAD_WORKER_LAMBDA_ARN }}
          UPLOAD_WORKER_ECR_URL: ${{ secrets.UPLOAD_WORKER_ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/ci/lambda-upload-worker-set-image.sh
