# Single entry point for deploys on main: Terraform apply first, then backend images, then frontend static site.
# Prereqs: remote state (S3 + DynamoDB), GitHub secrets TF_STATE_BUCKET, TF_STATE_LOCK_TABLE, TFVARS_B64,
#          AWS_DEPLOY_ROLE_ARN (+ ECR/App Runner/Lambda secrets as in infra/README.md). Enable
#          github_terraform_apply_enabled in Terraform once from a trusted host so the OIDC role can apply.

name: Deploy main

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  paths:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/terraform/**'
              - '.github/workflows/deploy-main.yml'
            backend:
              - 'backend/**'
              - 'scripts/ci/apprunner-set-image.sh'
              - 'scripts/ci/lambda-upload-worker-set-image.sh'
              - '.github/workflows/deploy-main.yml'
            frontend:
              - 'frontend/**'
              - 'scripts/ci/sync-frontend-s3.sh'
              - '.github/workflows/deploy-main.yml'

  terraform:
    needs: [paths]
    if: ${{ needs.paths.outputs.infra == 'true' || needs.paths.outputs.backend == 'true' || needs.paths.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Require remote-state secrets
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
          TFVARS_B64: ${{ secrets.TFVARS_B64 }}
        run: |
          if [ -z "$TF_STATE_BUCKET" ] || [ -z "$TF_STATE_LOCK_TABLE" ] || [ -z "$TFVARS_B64" ]; then
            echo "Set GitHub secrets TF_STATE_BUCKET, TF_STATE_LOCK_TABLE, TFVARS_B64 (see infra/README.md)."
            exit 1
          fi

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Write terraform.tfvars from secret
        run: echo "${{ secrets.TFVARS_B64 }}" | base64 -d > terraform.tfvars

      - name: Write S3 backend config
        env:
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
          REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
          KEY: ${{ vars.TF_STATE_KEY || 'audit-nigeria/prod/terraform.tfstate' }}
        run: |
          cat > "$GITHUB_WORKSPACE/.tf-backend.ci" <<EOF
          bucket         = "${BUCKET}"
          key            = "${KEY}"
          region         = "${REGION}"
          encrypt        = true
          dynamodb_table = "${TABLE}"
          EOF

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false -backend-config="$GITHUB_WORKSPACE/.tf-backend.ci"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false

  backend:
    needs: [paths, terraform]
    if: ${{ needs.paths.outputs.backend == 'true' && needs.terraform.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_URI: ${{ secrets.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$ECR_URI" ]; then
            echo "Set repository secret ECR_REPOSITORY_URI to Terraform output ecr_repository_url (no tag)."
            exit 1
          fi
          IMAGE="${ECR_URI}:${IMAGE_TAG}"
          docker build -f backend/Dockerfile -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "Pushed ${IMAGE}"

      - name: Build and push async upload worker image
        env:
          WORKER_URI: ${{ secrets.UPLOAD_WORKER_ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$WORKER_URI" ]; then
            echo "Optional: set UPLOAD_WORKER_ECR_REPOSITORY_URI to push the Lambda image."
            exit 0
          fi
          IMAGE="${WORKER_URI}:${IMAGE_TAG}"
          docker build -f backend/Dockerfile.lambda --platform linux/amd64 --provenance=false --sbom=false -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "Pushed ${IMAGE}"

      - name: Point App Runner at new API image
        env:
          APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
          ECR_REPOSITORY_URI: ${{ secrets.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/ci/apprunner-set-image.sh

      - name: Update upload worker Lambda
        env:
          UPLOAD_WORKER_LAMBDA_ARN: ${{ secrets.UPLOAD_WORKER_LAMBDA_ARN }}
          UPLOAD_WORKER_ECR_URL: ${{ secrets.UPLOAD_WORKER_ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/ci/lambda-upload-worker-set-image.sh

  frontend:
    needs: [paths, terraform]
    if: ${{ needs.paths.outputs.frontend == 'true' && needs.terraform.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Build and sync
        env:
          REPO_ROOT: ${{ github.workspace }}
          FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "$FRONTEND_S3_BUCKET" ] || [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ] || [ -z "$NEXT_PUBLIC_API_URL" ]; then
            echo "Set Actions variables: FRONTEND_S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID, NEXT_PUBLIC_API_URL."
            exit 1
          fi
          bash scripts/ci/sync-frontend-s3.sh
