# Single entry point for deploys on main: Terraform apply first, then backend images, then frontend static site.
# Prereqs: remote state (S3 + DynamoDB), GitHub secrets TF_STATE_BUCKET, TF_STATE_LOCK_TABLE, TFVARS_B64,
#          AWS_DEPLOY_ROLE_ARN (+ ECR/App Runner/Lambda secrets as in infra/README.md). Enable
#          github_terraform_apply_enabled in Terraform once from a trusted host so the OIDC role can apply.

name: Deploy main

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  paths:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/terraform/**'
              - '.github/workflows/deploy-main.yml'
            backend:
              - 'backend/**'
              - 'scripts/ci/apprunner-set-image.sh'
              - 'scripts/ci/lambda-upload-worker-set-image.sh'
              - '.github/workflows/deploy-main.yml'
            frontend:
              - 'frontend/**'
              - 'scripts/ci/sync-frontend-s3.sh'
              - '.github/workflows/deploy-main.yml'

  terraform:
    needs: [paths]
    if: ${{ needs.paths.outputs.infra == 'true' || needs.paths.outputs.backend == 'true' || needs.paths.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Require remote-state secrets
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
          TFVARS_B64: ${{ secrets.TFVARS_B64 }}
        run: |
          missing=""
          [ -z "$TF_STATE_BUCKET" ] && missing="${missing} TF_STATE_BUCKET"
          [ -z "$TF_STATE_LOCK_TABLE" ] && missing="${missing} TF_STATE_LOCK_TABLE"
          [ -z "$TFVARS_B64" ] && missing="${missing} TFVARS_B64"
          if [ -n "$missing" ]; then
            echo "Missing repository secrets:$missing"
            echo "Create them under Settings → Secrets and variables → Actions (see infra/README.md, GitHub Actions)."
            exit 1
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      # Run before decoding TFVARS_B64: generated terraform.tfvars is often not "fmt clean" and must
      # not fail this check; committed .tf files are the style contract for the repo.
      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Write terraform.tfvars from secret
        run: echo "${{ secrets.TFVARS_B64 }}" | base64 -d > terraform.tfvars

      # When frontend_cloudfront_enabled, Terraform uploads `frontend/out` via fileset(); the runner
      # has no export unless we build here (avoids check block failure and mass destroy of S3 objects).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Next static export (for Terraform-managed dashboard files)
        working-directory: ${{ github.workspace }}/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          set -euo pipefail
          TFVARS="${GITHUB_WORKSPACE}/infra/terraform/terraform.tfvars"
          if ! grep -qE '^[[:space:]]*frontend_cloudfront_enabled[[:space:]]*=[[:space:]]*true([[:space:]]|#|$)' "$TFVARS"; then
            echo "frontend_cloudfront_enabled is not true in terraform.tfvars; skipping static export."
            exit 0
          fi
          if [ -z "${NEXT_PUBLIC_API_URL:-}" ]; then
            echo "Set Actions variable NEXT_PUBLIC_API_URL (required for STATIC_EXPORT when CloudFront is enabled)."
            exit 1
          fi
          export STATIC_EXPORT=1
          npm ci
          npm run build:static

      - name: Write S3 backend config
        env:
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
          REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
          KEY: ${{ vars.TF_STATE_KEY || 'audit-nigeria/prod/terraform.tfstate' }}
        run: |
          cat > "$GITHUB_WORKSPACE/.tf-backend.ci" <<EOF
          bucket         = "${BUCKET}"
          key            = "${KEY}"
          region         = "${REGION}"
          encrypt        = true
          dynamodb_table = "${TABLE}"
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config="$GITHUB_WORKSPACE/.tf-backend.ci"

      # Optional repo secrets override TFVARS_B64 for sensitive vars (same as local TF_VAR_*).
      # If telegram_create_secret=true but the token is not inside TFVARS_B64, set TELEGRAM_BOT_TOKEN here.
      - name: Terraform validate and apply
        env:
          CI_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CI_OPENROUTER_API_KEY: ${{ secrets.TERRAFORM_OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${CI_TELEGRAM_BOT_TOKEN:-}" ]; then export TF_VAR_telegram_bot_token="$CI_TELEGRAM_BOT_TOKEN"; fi
          if [ -n "${CI_OPENROUTER_API_KEY:-}" ]; then export TF_VAR_apprunner_openrouter_api_key="$CI_OPENROUTER_API_KEY"; fi
          terraform validate
          set +e
          terraform apply -auto-approve -input=false 2>&1 | tee "$GITHUB_WORKSPACE/terraform-apply.log"
          code=$?
          set -e
          if [ "$code" -ne 0 ]; then
            echo ""
            echo "=== terraform apply failed (exit $code); last 120 lines of log ==="
            tail -n 120 "$GITHUB_WORKSPACE/terraform-apply.log" || true
          fi
          exit "$code"

  backend:
    needs: [paths, terraform]
    if: ${{ needs.paths.outputs.backend == 'true' && needs.terraform.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_URI: ${{ secrets.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$ECR_URI" ]; then
            echo "Set repository secret ECR_REPOSITORY_URI to Terraform output ecr_repository_url (no tag)."
            exit 1
          fi
          IMAGE="${ECR_URI}:${IMAGE_TAG}"
          docker build -f backend/Dockerfile -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "Pushed ${IMAGE}"

      - name: Build and push async upload worker image
        env:
          WORKER_URI: ${{ secrets.UPLOAD_WORKER_ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$WORKER_URI" ]; then
            echo "Optional: set UPLOAD_WORKER_ECR_REPOSITORY_URI to push the Lambda image."
            exit 0
          fi
          IMAGE="${WORKER_URI}:${IMAGE_TAG}"
          docker build -f backend/Dockerfile.lambda --platform linux/amd64 --provenance=false --sbom=false -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "Pushed ${IMAGE}"

      - name: Point App Runner at new API image
        env:
          APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
          ECR_REPOSITORY_URI: ${{ secrets.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/ci/apprunner-set-image.sh

      - name: Update upload worker Lambda
        env:
          UPLOAD_WORKER_LAMBDA_ARN: ${{ secrets.UPLOAD_WORKER_LAMBDA_ARN }}
          UPLOAD_WORKER_ECR_URL: ${{ secrets.UPLOAD_WORKER_ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/ci/lambda-upload-worker-set-image.sh

      # After the new image is live: idempotent ADD COLUMN (same as backend/sql/patch_human_review_alert.sql).
      # Requires LAMBDA_ADMIN_PATCH_TOKEN = upload_worker_admin_patch_token in Terraform, and
      # infra/terraform on GitHub has applied the IAM allowlist for lambda:InvokeFunction on this role.
      - name: Apply HIL DB patch via upload-worker Lambda
        env:
          LAMBDA_ARN: ${{ secrets.UPLOAD_WORKER_LAMBDA_ARN }}
          PATCH_TOKEN: ${{ secrets.LAMBDA_ADMIN_PATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${LAMBDA_ARN:-}" ] || [ -z "${PATCH_TOKEN:-}" ]; then
            echo "Skip: set GitHub secrets UPLOAD_WORKER_LAMBDA_ARN and LAMBDA_ADMIN_PATCH_TOKEN (same value as upload_worker_admin_patch_token in Terraform; wires LAMBDA_ADMIN_PATCH_TOKEN on the function)."
            exit 0
          fi
          PFILE="${RUNNER_TEMP}/hil-patch-payload.json"
          OUT="${RUNNER_TEMP}/lambda-hil-patch-out.json"
          jq -n --arg t "$PATCH_TOKEN" '{action: "patch_human_review_alert", admin_token: $t}' > "$PFILE"
          aws lambda invoke \
            --function-name "$LAMBDA_ARN" \
            --cli-read-timeout 300 \
            --cli-binary-format raw-in-base64-out \
            --payload "file://${PFILE}" \
            "$OUT"
          cat "$OUT"
          if ! jq -e '.ok == true' <"$OUT" >/dev/null 2>&1; then
            echo "::error::Lambda HIL patch failed (see output above). Check LAMBDA_ADMIN_PATCH_TOKEN and VPC/RDS access for the function."
            exit 1
          fi
          echo "HIL column patch ok (result_clusters.human_review_alert_sent_at)."

  frontend:
    needs: [paths, terraform]
    if: ${{ needs.paths.outputs.frontend == 'true' && needs.terraform.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Build and sync
        env:
          REPO_ROOT: ${{ github.workspace }}
          FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "$FRONTEND_S3_BUCKET" ] || [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ] || [ -z "$NEXT_PUBLIC_API_URL" ]; then
            echo "Set Actions variables: FRONTEND_S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID, NEXT_PUBLIC_API_URL."
            exit 1
          fi
          bash scripts/ci/sync-frontend-s3.sh
